<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overland</title>
  </head>
  <body>
    <div id="app-loader" aria-live="polite" aria-busy="true">
      <div class="app-loader__inner">
        <div class="app-loader__spinner" aria-hidden="true"></div>
        <p class="app-loader__label">Loading Overland…</p>
      </div>
    </div>
    <div id="root"></div>
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #edf3f8;
        font-family: 'Cabin', system-ui, sans-serif;
        transition: opacity 0.25s ease;
      }
      #app-loader.app-loader--hidden {
        opacity: 0;
        pointer-events: none;
      }
      .app-loader__inner {
        text-align: center;
      }
      .app-loader__spinner {
        width: 36px;
        height: 36px;
        margin: 0 auto 12px;
        border: 3px solid #d4dde3;
        border-top-color: #2e7da8;
        border-radius: 50%;
        animation: app-loader-spin 0.8s linear infinite;
      }
      .app-loader__label {
        margin: 0;
        font-size: 13px;
        letter-spacing: 0.04em;
        color: #5a7a8a;
      }
      @keyframes app-loader-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
